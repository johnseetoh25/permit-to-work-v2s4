<mat-toolbar class = "app-toolbar">
    <mat-toolbar-row>
        <div *ngIf = "this.homeTitleAsSignOut">
            <span>
                <a style = "cursor: pointer" class = "toolbar-title" (click) = "this.openSignOutDialog()">Permit to Work (PTW) - E-Management System</a>
            </span>
        </div>
        <div *ngIf = "!this.homeTitleAsSignOut">
            <span>
                <a style = "cursor: pointer" class = "toolbar-title" (click) = "this.navigateTo('')">Permit to Work (PTW) - E-Management System</a>
            </span>
        </div>
        <span class = "toolbar-spacer"></span>
    </mat-toolbar-row>
</mat-toolbar>
<router-outlet></router-outlet>
